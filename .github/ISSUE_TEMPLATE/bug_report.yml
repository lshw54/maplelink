name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: MapleLink Version
      description: Check in Toolbox → About
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      options:
        - HK
        - TW
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open MapleLink
        2. Login with ...
        3. Click ...

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: "Paste from `%LOCALAPPDATA%\\com.maplelink.app\\logs\\maplelink.log`"
      render: text

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
