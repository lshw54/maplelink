name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease
          - release
      version_increment:
        description: "Version increment type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      release_name:
        description: "Release name (leave empty to auto-generate)"
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Prepare version
        id: version
        shell: pwsh
        run: |
          # Read current version from Cargo.toml
          $cargoToml = Get-Content "src-tauri/Cargo.toml" -Raw
          if ($cargoToml -match 'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"') {
              $major = [int]$matches[1]
              $minor = [int]$matches[2]
              $patch = [int]$matches[3]
          } else {
              Write-Error "Could not parse version from Cargo.toml"
              exit 1
          }

          # Check latest tag for actual version
          git fetch --tags 2>$null
          $tags = git tag -l "v*" --sort=-v:refname
          $tagsArray = @($tags)
          if ($tagsArray.Count -gt 0 -and $tagsArray[0]) {
              $latestTag = $tagsArray[0]
              if ($latestTag -match "^v(\d+)\.(\d+)\.(\d+)") {
                  $major = [int]$matches[1]
                  $minor = [int]$matches[2]
                  $patch = [int]$matches[3]
              }
          }

          # Increment version
          $increment = "${{ github.event.inputs.version_increment }}"
          switch ($increment) {
              'major' { $major++; $minor=0; $patch=0 }
              'minor' { $minor++; $patch=0 }
              'patch' { $patch++ }
          }

          $version = "$major.$minor.$patch"
          $tagName = "v$version"
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss")

          Write-Host "New version: $version (tag: $tagName)"

          # Inject version into Cargo.toml (build-time only, not committed)
          $cargoToml = $cargoToml -replace 'version\s*=\s*"\d+\.\d+\.\d+"', "version = `"$version`""
          $cargoToml | Set-Content "src-tauri/Cargo.toml" -NoNewline

          # Inject into tauri.conf.json5
          $tauriConf = Get-Content "src-tauri/tauri.conf.json5" -Raw
          $tauriConf = $tauriConf -replace '"version":\s*"\d+\.\d+\.\d+"', "`"version`": `"$version`""
          $tauriConf | Set-Content "src-tauri/tauri.conf.json5" -NoNewline

          # Inject into package.json
          $pkgJson = Get-Content "package.json" -Raw
          $pkgJson = $pkgJson -replace '"version":\s*"\d+\.\d+\.\d+"', "`"version`": `"$version`""
          $pkgJson | Set-Content "package.json" -NoNewline

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "build_time=$buildTime" >> $env:GITHUB_OUTPUT

      - name: Build Tauri app
        run: npx @tauri-apps/cli build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Prepare artifact
        id: artifact
        shell: pwsh
        run: |
          Copy-Item "src-tauri/target/release/maplelink.exe" "MapleLink.exe"
          $hash = (Get-FileHash "MapleLink.exe" -Algorithm SHA256).Hash
          $size = (Get-Item "MapleLink.exe").Length
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"
          Write-Host "Size: $size bytes"

      - name: Prepare release notes
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
          $lastRelease = gh api repos/${{ github.repository }}/releases --paginate 2>$null | ConvertFrom-Json | Sort-Object created_at -Descending | Select-Object -First 1
          $range = if ($lastRelease) { "$($lastRelease.tag_name)..HEAD" } else { "-n 30" }

          # Get raw commits with author login via GitHub-style format
          $rawCommits = git log $range --pretty=format:"%h|%H|%s|%an|%ae|%as" --no-merges 2>$null

          # Build a cache of GitHub username -> display name
          $nameCache = @{}
          function Get-DisplayName($authorName, $authorEmail) {
            # Try to extract GitHub username from noreply email
            $ghUser = $null
            if ($authorEmail -match '(\d+\+)?(.+)@users\.noreply\.github\.com') {
              $ghUser = $matches[2]
            }
            if (-not $ghUser) {
              # Fallback: use author name as-is
              return $authorName
            }
            if ($nameCache.ContainsKey($ghUser)) {
              return $nameCache[$ghUser]
            }
            try {
              $user = gh api users/$ghUser 2>$null | ConvertFrom-Json
              $displayName = if ($user.name) { $user.name } else { $ghUser }
              $nameCache[$ghUser] = $displayName
              return $displayName
            } catch {
              $nameCache[$ghUser] = $authorName
              return $authorName
            }
          }

          $commitLines = @()
          if ($rawCommits) {
            foreach ($line in ($rawCommits -split "`n")) {
              $parts = $line -split '\|', 6
              if ($parts.Count -ge 6) {
                $shortHash = $parts[0]
                $fullHash = $parts[1]
                $subject = $parts[2]
                $authorName = $parts[3]
                $authorEmail = $parts[4]
                $date = $parts[5]
                $displayName = Get-DisplayName $authorName $authorEmail
                $commitLines += "- [$shortHash]($repoUrl/commit/$fullHash) $subject — $displayName, $date"
              }
            }
          }

          $commitCount = $commitLines.Count
          $commitsText = if ($commitCount -gt 0) { $commitLines -join "`n" } else { "Initial release" }

          $delimiter = "EOF_$([guid]::NewGuid().ToString('N'))"
          "commits<<$delimiter" >> $env:GITHUB_OUTPUT
          $commitsText >> $env:GITHUB_OUTPUT
          $delimiter >> $env:GITHUB_OUTPUT
          "count=$commitCount" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: >
            ${{
              github.event.inputs.release_name != ''
                && github.event.inputs.release_name
                || format('v{0}', steps.version.outputs.version)
            }}
          body: |
            **Version:** v${{ steps.version.outputs.version }}
            **Type:** ${{ github.event.inputs.release_type == 'release' && 'Release' || 'Pre-Release' }}
            **Built:** ${{ steps.version.outputs.build_time }} UTC

            ---

            ### Download
            **[MapleLink.exe](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag_name }}/MapleLink.exe)** — standalone, no installation needed

            ### Changes
            ${{ steps.notes.outputs.commits }}

            (${{ steps.notes.outputs.count }} commits)

            ### Usage
            1. Download **MapleLink.exe**
            2. Place in any folder and run
            3. First launch will auto-extract locale emulation files

            ${{ github.event.inputs.release_type == 'prerelease' && '> ⚠️ This is a pre-release. Use at your own risk.' || '' }}

            <details>
            <summary>Details</summary>

            | Item | Value |
            |------|-------|
            | SHA256 | `${{ steps.artifact.outputs.sha256 }}` |
            | Build Time | ${{ steps.version.outputs.build_time }} UTC |
            | Commit | [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |

            </details>
          files: MapleLink.exe
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'prerelease' }}
          make_latest: ${{ github.event.inputs.release_type == 'release' && 'true' || 'false' }}

      - name: Commit version bump (verified)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stage version files and check if there are changes
          git add src-tauri/Cargo.toml src-tauri/tauri.conf.json5 package.json
          if (git diff --cached --quiet) { exit 0 }

          $repo = "${{ github.repository }}"
          $parentSha = "${{ github.sha }}"

          # Build tree entries from the modified files using GitHub's blob API
          $files = @(
            "src-tauri/Cargo.toml",
            "src-tauri/tauri.conf.json5",
            "package.json"
          )

          $treeEntries = @()
          foreach ($file in $files) {
            $content = Get-Content $file -Raw
            # Create a blob via GitHub API
            $blobBody = @{ content = $content; encoding = "utf-8" } | ConvertTo-Json -Compress
            $blob = $blobBody | gh api repos/$repo/git/blobs --method POST --input - | ConvertFrom-Json
            $treeEntries += @{
              path = $file
              mode = "100644"
              type = "blob"
              sha  = $blob.sha
            }
          }

          # Create a new tree based on the parent commit's tree
          $parentCommit = gh api repos/$repo/git/commits/$parentSha | ConvertFrom-Json
          $baseTreeSha = $parentCommit.tree.sha

          $treeBody = @{
            base_tree = $baseTreeSha
            tree = $treeEntries
          } | ConvertTo-Json -Compress -Depth 4
          $tree = $treeBody | gh api repos/$repo/git/trees --method POST --input - | ConvertFrom-Json
          Write-Host "Created tree: $($tree.sha)"

          # Create a verified commit via GitHub API (signed by GitHub)
          $commitBody = @{
            message = "chore: bump version to ${{ steps.version.outputs.version }}"
            tree    = $tree.sha
            parents = @($parentSha)
          } | ConvertTo-Json -Compress
          $commit = $commitBody | gh api repos/$repo/git/commits --method POST --input - | ConvertFrom-Json
          Write-Host "Created verified commit: $($commit.sha)"

          # Update the branch ref to point to the new verified commit
          $refBody = @{ sha = $commit.sha; force = $false } | ConvertTo-Json -Compress
          $refBody | gh api repos/$repo/git/refs/heads/main --method PATCH --input -
